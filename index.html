<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SH ATM</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/dist/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: #0d1117;
    min-height: 100vh;
    display: flex;
  }

  /* SIDEBAR */
  .sidebar {
    width: 220px;
    min-height: 100vh;
    background: #111622;
    border-right: 1px solid #1e2535;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .sidebar-logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid #1e2535;
  }

  .bank-logo-row {
    display: flex; align-items: center; gap: 12px;
  }

  .bank-icon {
    width: 40px; height: 40px;
    background: #f5a623;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: #0d1117; font-weight: 700;
    font-family: 'Rajdhani', sans-serif;
  }

  .bank-name { font-size: 18px; font-weight: 700; color: #f5a623; letter-spacing: 1px; }
  .bank-sub  { font-size: 9px; color: #445; letter-spacing: 2px; text-transform: uppercase; margin-top: 1px; }

  .status-row {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 20px;
    border-bottom: 1px solid #1e2535;
  }

  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #2ecc71; box-shadow: 0 0 5px #2ecc71;
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  .status-txt { font-size: 10px; color: #3a5; font-family: 'Share Tech Mono', monospace; letter-spacing: 1px; }

  .nav-menu { padding: 16px 12px; flex: 1; }

  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px; font-weight: 600;
    color: #556;
    text-transform: uppercase; letter-spacing: 1px;
    transition: all 0.15s;
    margin-bottom: 4px;
    border: 1px solid transparent;
  }

  .nav-item i { font-size: 18px; }
  .nav-item:hover { background: #1a2035; color: #aab; }
  .nav-item.active { background: #1a2540; color: #f5a623; border-color: #f5a6231a; }

  .nav-item.danger { color: #554; }
  .nav-item.danger:hover { background: #200a0a; color: #e74c3c; }
  .nav-item.danger.active { background: #200a0a; color: #e74c3c; border-color: #e74c3c22; }

  .sidebar-footer {
    padding: 14px 20px;
    border-top: 1px solid #1e2535;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; color: #334;
    letter-spacing: 1px;
  }

  /* MAIN CONTENT */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .topbar {
    background: #111622;
    border-bottom: 1px solid #1e2535;
    padding: 14px 32px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .topbar-title {
    font-size: 20px; font-weight: 700; color: #e0e6f0;
    letter-spacing: 1px;
  }

  .topbar-right {
    display: flex; align-items: center; gap: 20px;
    font-family: 'Share Tech Mono', monospace; font-size: 11px; color: #445;
  }

  .bal-chip {
    background: #1a2035;
    border: 1px solid #1e2535;
    border-radius: 8px;
    padding: 6px 14px;
    color: #f5a623;
    font-size: 13px; font-weight: 600;
  }

  .content {
    flex: 1;
    padding: 40px 48px;
  }

  /* CARDS */
  .page-header {
    margin-bottom: 32px;
  }

  .page-header h1 {
    font-size: 28px; font-weight: 700; color: #e0e6f0;
    margin-bottom: 4px;
  }

  .page-header p {
    font-size: 13px; color: #445;
    font-family: 'Share Tech Mono', monospace;
  }

  .card {
    background: #111622;
    border: 1px solid #1e2535;
    border-radius: 16px;
    padding: 32px;
    max-width: 520px;
  }

  .form-group { margin-bottom: 20px; }

  .form-label {
    display: block; font-size: 10px; color: #445;
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 8px;
    font-family: 'Share Tech Mono', monospace;
  }

  .form-input {
    width: 100%;
    background: #0d1117;
    border: 1px solid #1e2535;
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px; color: #e0e6f0;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: #f5a623; }
  .form-input::placeholder { color: #2a3040; }

  .btn-primary {
    background: #f5a623; color: #0d1117;
    border: none; border-radius: 10px;
    padding: 14px 32px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-primary:hover { background: #e09516; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary.full { width: 100%; }

  .btn-danger {
    background: #e74c3c; color: #fff;
    border: none; border-radius: 10px;
    padding: 14px 32px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    width: 100%;
  }
  .btn-danger:hover { background: #c0392b; }

  .msg-box {
    padding: 12px 16px; border-radius: 8px;
    font-size: 13px; font-weight: 600;
    margin-bottom: 16px;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 0.5px;
  }
  .msg-success { background: #0a2010; color: #2ecc71; border: 1px solid #1a5030; }
  .msg-error   { background: #200a0a; color: #e74c3c; border: 1px solid #501a1a; }
  .msg-info    { background: #0a1020; color: #3498db; border: 1px solid #1a3050; }

  /* PIN DOTS */
  .pin-dots { display: flex; gap: 10px; margin-bottom: 20px; }
  .pin-dot {
    width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid #2a3040; background: transparent; transition: all 0.2s;
  }
  .pin-dot.filled { background: #f5a623; border-color: #f5a623; }

  /* BALANCE DISPLAY */
  .balance-big {
    text-align: center; padding: 40px 0;
  }
  .balance-label-txt {
    font-size: 11px; color: #445; letter-spacing: 3px;
    text-transform: uppercase; margin-bottom: 12px;
    font-family: 'Share Tech Mono', monospace;
  }
  .balance-number {
    font-size: 56px; font-weight: 700; color: #f5a623;
    font-family: 'Share Tech Mono', monospace;
  }
  .balance-currency { font-size: 24px; color: #778; margin-right: 4px; }

  /* QUICK AMOUNTS */
  .quick-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    margin-bottom: 20px;
  }
  .quick-btn {
    background: #0d1117; border: 1px solid #1e2535; border-radius: 8px;
    padding: 10px 0; font-family: 'Rajdhani', sans-serif;
    font-size: 13px; font-weight: 600; color: #556;
    cursor: pointer; text-align: center; transition: all 0.15s;
  }
  .quick-btn:hover { background: #1a2035; color: #f5a623; border-color: #f5a623; }

  /* TRANSACTIONS */
  .txn-list { display: flex; flex-direction: column; gap: 0; }
  .txn-row {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 0;
    border-bottom: 1px solid #1e2535;
  }
  .txn-row:last-child { border-bottom: none; }
  .txn-icon {
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .txn-icon.deposit  { background: #0a2010; color: #2ecc71; }
  .txn-icon.withdraw { background: #200a0a; color: #e74c3c; }
  .txn-info { flex: 1; }
  .txn-type { font-size: 14px; font-weight: 600; color: #e0e6f0; }
  .txn-time { font-size: 11px; color: #445; font-family: 'Share Tech Mono', monospace; }
  .txn-right { text-align: right; }
  .txn-amount { font-size: 15px; font-weight: 700; font-family: 'Share Tech Mono', monospace; }
  .txn-amount.deposit  { color: #2ecc71; }
  .txn-amount.withdraw { color: #e74c3c; }
  .txn-bal { font-size: 11px; color: #445; font-family: 'Share Tech Mono', monospace; }

  /* HOME STATS */
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
  .stat-card {
    background: #111622; border: 1px solid #1e2535;
    border-radius: 12px; padding: 20px 24px;
  }
  .stat-label { font-size: 10px; color: #445; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; font-family: 'Share Tech Mono', monospace; }
  .stat-value { font-size: 28px; font-weight: 700; color: #e0e6f0; }
  .stat-value.gold { color: #f5a623; }
  .stat-value.green { color: #2ecc71; }

  .welcome-msg {
    background: #111622; border: 1px solid #1e2535;
    border-radius: 12px; padding: 24px 28px;
    margin-bottom: 24px;
  }
  .welcome-msg h2 { font-size: 22px; font-weight: 700; color: #e0e6f0; margin-bottom: 6px; }
  .welcome-msg p { font-size: 13px; color: #445; font-family: 'Share Tech Mono', monospace; }

  .no-txn { text-align: center; color: #334; font-family: 'Share Tech Mono', monospace; font-size: 13px; padding: 40px 0; }

@media (max-width: 768px) {

  html, body {
    width: 100%;
    overflow-x: hidden;
  }

  body {
    flex-direction: column;
    overflow-x: hidden;
  }

  /* SIDEBAR → TOP BAR STYLE */
  .sidebar {
    width: 100%;
    min-height: auto;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  .bank-logo-row {
    gap: 8px;
  }

  .bank-icon {
    width: 34px;
    height: 34px;
    font-size: 16px;
  }

  .bank-name {
    font-size: 14px;
  }

  /* Hide desktop sidebar items */
  .status-row,
  .sidebar-footer,
  .nav-menu {
    display: none;
  }

  /* MAIN */
  .main {
    width: 100%;
    flex: 1;
    min-width: 0;
  }

  .topbar {
    padding: 12px 14px;
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }

  .topbar-title {
    font-size: 16px;
  }

  .topbar-right {
    width: 100%;
    justify-content: space-between;
    flex-wrap: wrap;
  }

  .content {
    padding: 14px;
  }

  /* CARDS */
  .card {
    padding: 16px;
    width: 100%;
    max-width: 100%;
    overflow-x: hidden;
  }

  /* STATS */
  .stats-grid {
    grid-template-columns: 1fr;
    gap: 10px;
  }

  /* QUICK BUTTONS */
  .quick-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  /* BALANCE TEXT */
  .balance-number {
    font-size: 34px;
  }

  /* TXN STACK */
  .txn-row {
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
  }

  .txn-right {
    text-align: left;
    width: 100%;
  }

  /* BUTTONS */
  .btn-primary,
  .btn-danger {
    width: 100%;
  }
}

/* EXTRA SMALL PHONES */
@media (max-width: 400px) {
  .quick-grid {
    grid-template-columns: 1fr;
  }

  .balance-number {
    font-size: 28px;
  }
}
</style>

</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="bank-logo-row">
      <div class="bank-icon">SH</div>
      <div>
        <div class="bank-name">SH BANK</div>
      </div>
    </div>
  </div>
  <div class="status-row">
    <div class="status-dot"></div>
    <span class="status-txt">ONLINE</span>
  </div>
  <div class="nav-menu">
    <div class="nav-item active" id="nav-home" onclick="navigate('home')">
      <i class="ti ti-home"></i> Home
    </div>
    <div class="nav-item" id="nav-pin" onclick="navigate('pin')">
      <i class="ti ti-lock"></i> Set PIN
    </div>
    <div class="nav-item" id="nav-deposit" onclick="navigate('deposit')">
      <i class="ti ti-arrow-down-circle"></i> Deposit
    </div>
    <div class="nav-item" id="nav-withdraw" onclick="navigate('withdraw')">
      <i class="ti ti-arrow-up-circle"></i> Withdraw
    </div>
    <div class="nav-item" id="nav-balance" onclick="navigate('balance')">
      <i class="ti ti-wallet"></i> Balance
    </div>
    <div class="nav-item" id="nav-txn" onclick="navigate('txn')">
      <i class="ti ti-list"></i> History
    </div>
  </div>
  <div class="sidebar-footer">
    SN: ATM-<span id="sno">001</span><br>
    <span id="clock-side">--:--:--</span>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">Dashboard</div>
    <div class="topbar-right">
      <span id="clock-top">00:00:00</span>
      <div class="bal-chip" id="bal-chip">BAL: —</div>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
  let state = JSON.parse(localStorage.getItem('atmData')) || {
  pin:'',
  balance:0,
  transactions:[],
  pinSet:false,
  sno:1
};

function saveState() {
  localStorage.setItem('atmData', JSON.stringify(state));
}

  function clock() {
    const t = new Date().toTimeString().slice(0,8);
    document.getElementById('clock-top').textContent = t;
    document.getElementById('clock-side').textContent = t;
  }
  setInterval(clock, 1000); clock();

  function navigate(page) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const nav = document.getElementById('nav-' + page);
    if (nav) nav.classList.add('active');
    render(page);
  }

  function render(page) {
    const c = document.getElementById('content');
    const titles = { home:'Dashboard', pin:'Set PIN', deposit:'Deposit Cash', withdraw:'Withdraw Cash', balance:'Check Balance', txn:'Transaction History'};
    document.getElementById('topbar-title').textContent = titles[page] || '';

    if (page === 'home') {
      const txnCount = state.transactions.length;
      const deposits = state.transactions.filter(t => t.type==='Deposit').reduce((s,t)=>s+t.amount,0);
      c.innerHTML = `
        <div class="page-header">
          <h1>Welcome Back 👋</h1>
          <p>${state.pinSet ? 'Your account is active and ready.' : 'Please set your PIN to get started.'}</p>
        </div>
        ${!state.pinSet ? '<div class="msg-box msg-info">⚠ No PIN set. Go to Set PIN to activate your account.</div>' : ''}
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Current Balance</div>
            <div class="stat-value gold">PKR ${state.balance.toLocaleString()}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Transactions</div>
            <div class="stat-value">${txnCount}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Deposited</div>
            <div class="stat-value green">PKR ${deposits.toLocaleString()}</div>
          </div>
        </div>
        ${txnCount > 0 ? `
        <div style="color:#445;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-family:'Share Tech Mono',monospace;margin-bottom:12px;">Recent Transactions</div>
        <div class="card" style="padding:0 24px;">
          <div class="txn-list">${[...state.transactions].reverse().slice(0,5).map(txnRow).join('')}</div>
        </div>` : ''}`;
    }

    else if (page === 'pin') {
      c.innerHTML = `
        <div class="page-header">
          <h1>Create / Change PIN</h1>
          <p>Set a secure 4–8 digit PIN for your account.</p>
        </div>
        <div class="card">
          <div id="pmsg"></div>
          <div class="pin-dots" id="pdots">
            <div class="pin-dot"></div><div class="pin-dot"></div>
            <div class="pin-dot"></div><div class="pin-dot"></div>
          </div>
          <div class="form-group">
            <label class="form-label">New PIN</label>
            <input class="form-input" type="password" id="p1" maxlength="8" placeholder="Enter new PIN" oninput="updateDots()">
          </div>
          <div class="form-group">
            <label class="form-label">Confirm PIN</label>
            <input class="form-input" type="password" id="p2" maxlength="8" placeholder="Repeat PIN">
          </div>
          <button class="btn-primary full" onclick="doSetPin()">SET PIN</button>
        </div>`;
    }

    else if (page === 'deposit') {
      c.innerHTML = `
        <div class="page-header">
          <h1>Deposit Cash</h1>
          <p>Enter your PIN and amount to deposit.</p>
        </div>
        <div class="card">
          <div id="dmsg"></div>
          <div class="form-group">
            <label class="form-label">PIN</label>
            <input class="form-input" type="password" id="dpin" maxlength="8" placeholder="Enter PIN">
          </div>
          <div class="form-group">
            <label class="form-label">Amount (PKR)</label>
            <input class="form-input" type="number" id="damt" min="1" placeholder="e.g. 5000">
          </div>
          <button class="btn-primary full" onclick="doDeposit()">DEPOSIT CASH</button>
        </div>`;
    }

    else if (page === 'withdraw') {
      c.innerHTML = `
        <div class="page-header">
          <h1>Withdraw Cash</h1>
          <p>Enter your PIN and select or type an amount.</p>
        </div>
        <div class="card">
          <div id="wmsg"></div>
          <div class="form-group">
            <label class="form-label">PIN</label>
            <input class="form-input" type="password" id="wpin" maxlength="8" placeholder="Enter PIN">
          </div>
          <div class="form-group">
            <label class="form-label">Amount (PKR)</label>
            <input class="form-input" type="number" id="wamt" min="1" placeholder="e.g. 2000">
          </div>
          <div class="quick-grid">
            ${[500,1000,2000,5000].map(a=>`<div class="quick-btn" onclick="document.getElementById('wamt').value=${a}">PKR ${a.toLocaleString()}</div>`).join('')}
          </div>
          <button class="btn-primary full" onclick="doWithdraw()">WITHDRAW CASH</button>
        </div>`;
    }

    else if (page === 'balance') {
      c.innerHTML = `
        <div class="page-header">
          <h1>Check Balance</h1>
          <p>Verify your PIN to view available balance.</p>
        </div>
        <div class="card">
          <div id="bmsg"></div>
          <div class="form-group">
            <label class="form-label">PIN</label>
            <input class="form-input" type="password" id="bpin" maxlength="8" placeholder="Enter PIN">
          </div>
          <button class="btn-primary full" onclick="doBalance()">CHECK BALANCE</button>
          <div id="barea"></div>
        </div>`;
    }

    else if (page === 'txn') {
      c.innerHTML = `
        <div class="page-header">
          <h1>Transaction History</h1>
          <p>Last ${Math.min(state.transactions.length,20)} transactions shown.</p>
        </div>
        <div class="card" style="padding:0 24px; max-width:680px;">
          ${state.transactions.length === 0
            ? '<div class="no-txn">No transactions yet.</div>'
            : `<div class="txn-list">${[...state.transactions].reverse().slice(0,20).map(txnRow).join('')}</div>`}
        </div>`;
    }

    else if (page === 'reset') {
      c.innerHTML = `
        <div class="page-header">
          <h1>Reset ATM</h1>
          <p>This will clear all session data — PIN, balance, and history.</p>
        </div>
        <div class="card" style="max-width:400px; text-align:center;">
          <div style="font-size:48px; margin-bottom:16px;">⚠️</div>
          <p style="color:#778; font-size:14px; margin-bottom:24px; font-family:'Share Tech Mono',monospace;">
            Are you sure? This action cannot be undone.
          </p>
          <button class="btn-danger" onclick="doReset()">CONFIRM RESET</button>
        </div>`;
    }
  }

  function txnRow(t) {
    const cls = t.type === 'Deposit' ? 'deposit' : 'withdraw';
    const sign = t.type === 'Deposit' ? '+' : '-';
    return `<div class="txn-row">
      <div class="txn-icon ${cls}">${t.type==='Deposit'?'↓':'↑'}</div>
      <div class="txn-info">
        <div class="txn-type">${t.type}</div>
        <div class="txn-time">${t.time}</div>
      </div>
      <div class="txn-right">
        <div class="txn-amount ${cls}">${sign}PKR ${t.amount.toLocaleString()}</div>
        <div class="txn-bal">Bal: ${t.balance.toLocaleString()}</div>
      </div>
    </div>`;
  }

  function updateDots() {
    const val = document.getElementById('p1').value;
    document.querySelectorAll('#pdots .pin-dot').forEach((d,i) => d.classList.toggle('filled', i < val.length));
  }

  function updateChip() {
    document.getElementById('bal-chip').textContent = state.pinSet ? 'PKR ' + state.balance.toLocaleString() : 'BAL: —';
  }

  function doSetPin() {
    const p1 = document.getElementById('p1').value;
    const p2 = document.getElementById('p2').value;
    const el = document.getElementById('pmsg');
    if (!p1) { el.innerHTML = '<div class="msg-box msg-error">Please enter a PIN.</div>'; return; }
    if (p1.length < 4) { el.innerHTML = '<div class="msg-box msg-error">PIN must be at least 4 digits.</div>'; return; }
    if (p1 !== p2) { el.innerHTML = '<div class="msg-box msg-error">PINs do not match.</div>'; return; }
    state.pin = p1; state.pinSet = true; saveState();
    el.innerHTML = '<div class="msg-box msg-success">✓ PIN set successfully!</div>';
    updateChip();
    setTimeout(() => navigate('home'), 1500);
  }

  function doDeposit() {
    const pin = document.getElementById('dpin').value;
    const amount = parseInt(document.getElementById('damt').value);
    const el = document.getElementById('dmsg');
    if (!state.pinSet) { el.innerHTML = '<div class="msg-box msg-error">Set PIN first.</div>'; return; }
    if (pin !== state.pin) { el.innerHTML = '<div class="msg-box msg-error">Invalid PIN.</div>'; return; }
    if (!amount || amount <= 0) { el.innerHTML = '<div class="msg-box msg-error">Enter a valid amount.</div>'; return; }
    state.balance += amount;
    state.transactions.push({ type:'Deposit', amount, balance:state.balance, time:new Date().toLocaleTimeString() }); saveState();
    updateChip();
    el.innerHTML = `<div class="msg-box msg-success">✓ PKR ${amount.toLocaleString()} deposited successfully!</div>`;
    document.getElementById('damt').value = '';
  }

  function doWithdraw() {
    const pin = document.getElementById('wpin').value;
    const amount = parseInt(document.getElementById('wamt').value);
    const el = document.getElementById('wmsg');
    if (!state.pinSet) { el.innerHTML = '<div class="msg-box msg-error">Set PIN first.</div>'; return; }
    if (pin !== state.pin) { el.innerHTML = '<div class="msg-box msg-error">Invalid PIN.</div>'; return; }
    if (!amount || amount <= 0) { el.innerHTML = '<div class="msg-box msg-error">Enter a valid amount.</div>'; return; }
    if (amount > state.balance) { el.innerHTML = '<div class="msg-box msg-error">Insufficient funds.</div>'; return; }
    state.balance -= amount;
    state.transactions.push({ type:'Withdraw', amount, balance:state.balance, time:new Date().toLocaleTimeString() }); saveState();
    updateChip();
    el.innerHTML = `<div class="msg-box msg-success">✓ PKR ${amount.toLocaleString()} withdrawn successfully!</div>`;
    document.getElementById('wamt').value = '';
  }

  function doBalance() {
    const pin = document.getElementById('bpin').value;
    const el = document.getElementById('bmsg');
    const ba = document.getElementById('barea');
    if (!state.pinSet) { el.innerHTML = '<div class="msg-box msg-error">Set PIN first.</div>'; return; }
    if (pin !== state.pin) { el.innerHTML = '<div class="msg-box msg-error">Invalid PIN.</div>'; return; }
    el.innerHTML = '';
    ba.innerHTML = `<div class="balance-big">
      <div class="balance-label-txt">Available Balance</div>
      <div class="balance-number"><span class="balance-currency">PKR</span> ${state.balance.toLocaleString()}</div>
    </div>`;
  }

  function doReset() {
    state = { pin:'', balance:0, transactions:[], pinSet:false, sno:state.sno+1 };
    document.getElementById('sno').textContent = String(state.sno).padStart(3,'0');
    updateChip();
    navigate('home');
  }

  updateChip();

    document.getElementById('sno').textContent =
    String(state.sno).padStart(3,'0');

    render('home');
</script>
</body>
